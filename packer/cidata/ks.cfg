text
lang en_US.UTF-8
keyboard us
timezone UTC --utc
network --bootproto=dhcp --device=link --activate
rootpw --lock
selinux --enforcing
firewall --enabled --service=ssh
bootloader --location=mbr
zerombr
clearpart --all --initlabel
autopart
skipx
firstboot --disabled
eula --agreed
reboot

%packages
@^minimal-environment
qemu-guest-agent
cloud-init
cloud-utils-growpart
openssh-server
sudo
-plymouth
%end

%post
useradd -m -G wheel ansible
mkdir -p /home/ansible/.ssh
chmod 700 /home/ansible/.ssh
cat >> /home/ansible/.ssh/authorized_keys << 'EOF'
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKJX0mh+BfWY7aSt9LccuFdMbJCXEebr6qbI/glX7A6V ansible@theblacklodge.org
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ87NZyVSmPPFAD2gzBlv3YJSMD+amqBHTIkb5rGDETd austin@theblacklodge.org
EOF
chmod 600 /home/ansible/.ssh/authorized_keys
chown -R ansible:ansible /home/ansible/.ssh
echo "ansible ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/ansible
chmod 440 /etc/sudoers.d/ansible
systemctl enable qemu-guest-agent
systemctl enable cloud-init
%end