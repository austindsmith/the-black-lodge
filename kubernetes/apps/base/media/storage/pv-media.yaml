apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs
  namespace: media
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
    - nconnect=4
  nfs:
    server: 192.168.1.131
    path: /volume1/media
