apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media

resources:
  - ./pvc-config.yaml
  - ./ingressroute.yaml
  - ./deployment.yaml
  - ./service.yaml

helmCharts:
  - name: sonarr
    repo: https://charts.pree.dev
    version: 1.14.0
    releaseName: sonarr
    namespace: media
    valuesFile: values.yaml
    kubeVersion: v1.36.1
