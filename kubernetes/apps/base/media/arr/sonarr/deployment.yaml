apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  initContainers:
    - name: seed-config
      image: busybox:latest
      command:
        - sh
        - -c
        - |
          if [ ! -f /config/config.xml ]; then
            cp /seed/config.xml /config/config.xml
            echo "seeded config.xml"
          else
            echo "config.xml already exists, skipping"
          fi
      volumeMounts:
        - name: config
          mountPath: /config
        - name: sonarr-config-seed
          mountPath: /seed
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: America/Denver
          ports:
            - name: http
              containerPort: 8989
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: media
        - name: sonarr-config-seed
          secret:
            secretName: sonarr-config
