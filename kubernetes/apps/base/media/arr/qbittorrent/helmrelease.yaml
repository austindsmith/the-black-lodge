# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: Always

    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          seed-qbittorrent-config:
            image:
              repository: alpine
              tag: 3.21
            command:
              - sh
              - -c
              - |
                if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                  mkdir -p /config/qBittorrent
                  cat > /config/qBittorrent/qBittorrent.conf <<EOF
                [Preferences]
                WebUI\Username=qbittorrent
                WebUI\APIKey="$(cat /creds/api_key)"
                WebUI\Password_PBKDF2="$(cat /creds/qbittorrent_password_hash)"
                WebUI\Port=8080
                WebUI\AuthSubnetWhitelistEnabled=true
                WebUI\AuthSubnetWhitelist=0.0.0.0/0
                WebUI\LocalHostAuth=false
                WebUI\ReverseProxySupportEnabled=false
                WebUI\MaxAuthenticationFailCount=0
                WebUI\BanDuration=0
                WebUI\CSRFProtection=false
                WebUI\HostHeaderValidation=false
                WebUI\ServerDomains=*
                EOF
                fi
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent-libtorrentv1
              tag: 5.2.1@sha256:844555b6c1ed43afcb0001100973676fc6d825d5142c65f612a25fd9eba0bb0a
            env:
              TZ: America/Denver
              QBT_WEBUI_PORT: &port 8080
              defaultPodOptions:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch




              persistence:
                tmp:
                  type: emptyDir
                  globalMounts:
                    - path: /tmp
              capabilities:
                drop: ["ALL"]
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              #readiness:
              #  enabled: true
              #  custom: true
              #  spec:
              #    httpGet:
              #      path: /api/v2/app/version
              #      port: *port
              #    periodSeconds: 10
              #    timeoutSeconds: 5
              #    failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi

          gluetun:
            dependsOn: app
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.40.0
            env:
              WIREGUARD_MTU: "1320"
              VPN_PORT_FORWARDING: "on"
              PORT_FORWARD_ONLY: "on"
              VPN_TYPE: wireguard
              VPN_INTERFACE: wg0
              VPN_SERVICE_PROVIDER: protonvpn
              SERVER_COUNTRIES: United States
              FREE_ONLY: "off"
            envFrom:
              - secretRef:
                  name: qbittorrent-secret
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi

          port-sync:
            dependsOn: gluetun
            image:
              repository: ghcr.io/bjw-s-labs/gluetun-qb-port-sync
              tag: 0.0.4@sha256:6060da1978c5ec8ea1cad56d8538f35b504b1dcb3fc9845f1f69b18d1b36020a
            env:
              GLUETUN_CONTROL_SERVER_HOST: localhost
              GLUETUN_CONTROL_SERVER_PORT: 8000
              QBITTORRENT_HOST: localhost
              QBITTORRENT_WEBUI_PORT: 8080
              SYNC_INTERVAL_SECONDS: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 32Mi

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      app:
        className: traefik
        hosts:
          - host: qbittorrent.theblacklodge.dev
            paths:
              - path: /
                service:
                  identifier: app
                  port: 8080

    persistence:
      config:
        existingClaim: qbittorrent-config
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
            seed-qbittorrent-config:
              - path: /config
      creds:
        type: secret
        name: qbittorrent-seed
        advancedMounts:
          qbittorrent:
            seed-qbittorrent-config:
              - path: /creds
                readOnly: true
      gluetun-data:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /tmp/gluetun
            port-sync:
              - path: /tmp/gluetun
                readOnly: true
      media:
        existingClaim: media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
