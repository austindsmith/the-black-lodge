apiVersion: batch/v1
kind: CronJob
metadata:
  name: generate-staging-seed
  labels:
    app.kubernetes.io/name: generate
    app.kubernetes.io/component: staging-seed
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: generate
            app.kubernetes.io/component: staging-seed
        spec:
          restartPolicy: Never
          containers:
            - name: seed
              image: python:3.12-slim
              command: ["/bin/sh", "-c"]
              args:
                - |
                  pip install --no-cache-dir --quiet pymssql
                  python /scripts/seed_generate_staging.py \
                    --host generate-mssql \
                    --port 1433 \
                    --user sa \
                    --autodiscover \
                    --candidate-dbs Staging,Generate,ODS,RDS \
                    --skip-if-populated \
                    --school-year 2025 \
                    --leas 5 \
                    --schools 20 \
                    --students 500 \
                    --idea-rate 1.0
              env:
                - name: MSSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: generate-secrets
                      key: db_password
              volumeMounts:
                - name: seed-script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: seed-script
              configMap:
                name: generate-staging-seed-script
