apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "generate.fullname" . }}-background
  labels:
    {{- include "generate.labels" . | nindent 4 }}
    app.kubernetes.io/component: background
spec:
  replicas: {{ .Values.background.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: background
  template:
    metadata:
      labels:
        {{- include "generate.labels" . | nindent 8 }}
        app.kubernetes.io/component: background
    spec:
      containers:
        - name: background
          image: "{{ .Values.image.background.repository }}:{{ .Values.image.background.tag }}"
          imagePullPolicy: {{ .Values.image.background.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            {{- include "generate.appEnv" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.background.resources | nindent 12 }}
{{- if .Values.background.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "generate.fullname" . }}-background
  labels:
    {{- include "generate.labels" . | nindent 4 }}
    app.kubernetes.io/component: background
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: background
  ports:
    - name: http
      port: {{ .Values.background.service.port }}
      targetPort: http
{{- end }}
