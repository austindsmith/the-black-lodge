apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2026.5.0
      sourceRef:
        kind: HelmRepository
        name: authentik
  valuesFrom:
    - kind: Secret
      name: authentik
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secrets
      valuesKey: postgresql_password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secrets
      valuesKey: postgresql_password
      targetPath: postgresql.auth.password
  values:
    authentik:
      error_reporting:
        enabled: true
    server:
      ingress:
        ingressClassName: traefik
        enabled: true
        hosts:
          - authentik.theblacklodge.dev
    postgresql:
      enabled: true
