apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2026.5.2
      sourceRef:
        kind: HelmRepository
        name: authentik
  valuesFrom:
    - kind: Secret
      name: authentik
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik
      valuesKey: postgresql_password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik
      valuesKey: postgresql_password
      targetPath: postgresql.auth.password
    - kind: Secret
      name: authentik
      valuesKey: bootstrap_password
      targetPath: authentik.bootstrap_password
    - kind: Secret
      name: authentik
      valuesKey: bootstrap_token
      targetPath: authentik.bootstrap_token
    - kind: Secret
      name: authentik
      valuesKey: bootstrap_email
      targetPath: authentik.bootstrap_email
  values:
    authentik:
      error_reporting:
        enabled: true
      default_user_change_name: true
    postgresql:
      enabled: true
    server:
      extraEnvFrom:
        - secretRef:
            name: authentik-custom-blueprints
      ingress:
        enabled: false
      volumes:
        - name: custom-blueprints
          configMap:
            name: authentik-custom-blueprints
      volumeMounts:
        - name: custom-blueprints
          mountPath: /blueprints/custom
    worker:
      extraEnvFrom:
        - secretRef:
            name: authentik-custom-blueprints
      volumes:
        - name: custom-blueprints
          configMap:
            name: authentik-custom-blueprints
      volumeMounts:
        - name: custom-blueprints
          mountPath: /blueprints/custom
