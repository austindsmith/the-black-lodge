      name: 'authentik default Active Directory Mapping: sAMAccountName'
    conditions: []
    identifiers:
      pk: e8948893-2c12-4175-912f-51f0de5e6434
    model: authentik_sources_ldap.ldapsourcepropertymapping
    permissions: []
    state: present

  - attrs:
