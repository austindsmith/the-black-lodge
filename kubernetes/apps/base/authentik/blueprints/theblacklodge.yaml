version: 1
metadata:
  name: The Black Lodge
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Custom email scope with verified
    attrs:
      name: Custom email scope with verified
      scope_name: email
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Provider for Headlamp
    attrs:
      name: Provider for Headlamp
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env headlamp_client_id
      client_secret: !Env headlamp_client_secret
      client_type: confidential
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      refresh_token_threshold: hours=1
      include_claims_in_id_token: true
      issuer_mode: per_provider
      logout_method: backchannel
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom email scope with verified"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'profile'"]]
      redirect_uris:
        - matching_mode: regex
          url: https://headlamp.theblacklodge.dev/oidc-callback

  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Provider for Pangolin
    attrs:
      name: Provider for Pangolin
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env pangolin_client_id
      client_secret: !Env pangolin_client_secret
      client_type: confidential
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      refresh_token_threshold: hours=1
      include_claims_in_id_token: true
      issuer_mode: per_provider
      logout_method: backchannel
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: regex
          url: https://pangolin.theblacklodge.dev/auth/idp/1/oidc/callback

  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Provider for Cloudflare
    attrs:
      name: Provider for Cloudflare
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env cloudflare_client_id
      client_secret: !Env cloudflare_client_secret
      client_type: confidential
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      refresh_token_threshold: hours=1
      include_claims_in_id_token: true
      issuer_mode: per_provider
      logout_method: backchannel
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: regex
          url: https://theblacklodge.cloudflareaccess.com/cdn-cgi/access/callback

  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Provider for Proxmox
    attrs:
      name: Provider for Proxmox
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env proxmox_client_id
      client_secret: !Env proxmox_client_secret
      client_type: confidential
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      refresh_token_threshold: hours=1
      include_claims_in_id_token: true
      issuer_mode: per_provider
      logout_method: backchannel
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: strict
          url: https://proxmox.theblacklodge.dev

  - model: authentik_core.application
    identifiers:
      pk: 96b95f2b-2eb9-5bf0-be8c-ee5f9d66b9f8
    attrs:
      name: Headlamp
      slug: headlamp
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for Headlamp]]
      policy_engine_mode: any

  - model: authentik_core.application
    identifiers:
      pk: 4fc871a0-c3a6-4bdc-b35e-06897d32b97c
    attrs:
      name: Pangolin
      slug: pangolin
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for Pangolin]]
      policy_engine_mode: any

  - model: authentik_core.application
    identifiers:
      pk: d63dad65-9d46-55cf-b4da-fe8c86662d44
    attrs:
      name: Cloudflare
      slug: cloudflare
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for Cloudflare]]
      policy_engine_mode: any

  - model: authentik_core.application
    identifiers:
      pk: e9c0a071-c210-59f0-bc93-cda70613fcab
    attrs:
      name: Proxmox
      slug: proxmox
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for Proxmox]]
      policy_engine_mode: any

  - model: authentik_sources_ldap.ldapsourcepropertymapping
    state: present
    identifiers:
      name: FreeIPA group is_superuser
    attrs:
      name: FreeIPA group is_superuser
      expression: |
        if ldap.get("cn") == ["admins"]:
            return True
        return False
      object_field: is_superuser

  - attrs:
      additional_group_dn: !Env ldap_group_dn
      additional_user_dn: !Env ldap_user_dn
      base_dn: !Env ldap_base_dn
      bind_cn: !Env ldap_bind_cn
      bind_password: !Env ldap_bind_password
      delete_not_found_objects: true
      enabled: true
      group_membership_field: member
      group_object_filter: (objectClass=groupofnames)
      group_property_mappings:
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-samaccountname]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/openldap-uid]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/openldap-cn]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/default-mail]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/default-name]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/default-dn-path]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-userprincipalname]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-givenName]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-sn]]
      name: FreeIPA
      object_uniqueness_field: ipaUniqueID
      policy_engine_mode: any
      server_uri: !Env ldap_server_uri
      slug: freeipa
      sync_groups: true
      sync_outgoing_trigger_mode: deferred_end
      sync_users: true
      sync_users_password: true
      user_matching_mode: identifier
      user_membership_attribute: memberOf
      user_object_filter: (objectClass=person)
      user_path_template: goauthentik.io/sources/%(slug)s
      user_property_mappings:
        #- !Find [authentik_sources_ldap.ldapsourcepropertymapping, [name, "FreeIPA superuser from group"]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-samaccountname]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/openldap-uid]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/openldap-cn]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/default-mail]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/default-name]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/default-dn-path]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-userprincipalname]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-givenName]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, goauthentik.io/sources/ldap/ms-sn]]
    conditions: []
    identifiers:
      pk: e8f166bc-1685-4d84-8a81-bab67cf8b5d2
    model: authentik_sources_ldap.ldapsource
    permissions: []
    state: present

  - model: authentik_stages_authenticator_totp.authenticatorTOTPStage
    state: present
    identifiers:
      name: mfa-totp-setup
    attrs:
      name: mfa-totp-setup
      digits: "6"
      friendly_name: TOTP Authenticator

  - model: authentik_stages_authenticator_webauthn.authenticatorWebAuthnStage
    state: present
    identifiers:
      name: mfa-webauthn-setup
    attrs:
      name: mfa-webauthn-setup
      friendly_name: WebAuthn
      user_verification: preferred
      resident_key_requirement: preferred
      authenticator_attachment: null

  - model: authentik_stages_authenticator_validate.authenticatorValidateStage
    state: present
    identifiers:
      name: default-authentication-mfa-validation
    attrs:
      name: default-authentication-mfa-validation
      device_classes:
        - totp
        - webauthn
        - static
      not_configured_action: configure
      webauthn_user_verification: preferred
      configuration_stages:
        - !Find [authentik_stages_authenticator_totp.authenticatorTOTPStage, [name, mfa-totp-setup]]
        - !Find [authentik_stages_authenticator_webauthn.authenticatorWebAuthnStage, [name, mfa-webauthn-setup]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: akadmin
    attrs:
      name: akadmin
