version: 1
metadata:
  name: The Black Lodge
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.scopemapping
    ###################################################
    #                Property mappings                #
    ###################################################
    identifiers:
      name: Custom email scope with verified
    attrs:
      name: Custom email scope with verified
      scope_name: email
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - model: authentik_providers_oauth2.oauth2provider
    ###################################################
    #                    Providers                    #
    ###################################################
    identifiers:
      name: Provider for Headlamp
    attrs:
      name: Provider for Headlamp
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env headlamp_client_id
      client_secret: !Env headlamp_client_secret
      client_type: confidential
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      refresh_token_threshold: hours=1
      include_claims_in_id_token: true
      issuer_mode: per_provider
      logout_method: backchannel
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom email scope with verified"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'profile'"]]
      redirect_uris:
        - matching_mode: regex
          url: https://headlamp.theblacklodge.dev/oidc-callback

  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Provider for Pangolin
    attrs:
      name: Provider for Pangolin
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env pangolin_client_id
      client_secret: !Env pangolin_client_secret
      client_type: confidential
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      refresh_token_threshold: hours=1
      include_claims_in_id_token: true
      issuer_mode: per_provider
      logout_method: backchannel
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: regex
          url: https://pangolin.theblacklodge.dev/auth/idp/1/oidc/callback

