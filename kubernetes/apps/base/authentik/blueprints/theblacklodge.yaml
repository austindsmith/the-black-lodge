      name: 'authentik default LDAP Mapping: mail'
    conditions: []
    identifiers:
      pk: 707737a3-030e-4ce5-a625-fdef8b32bdf7
    model: authentik_sources_ldap.ldapsourcepropertymapping
    permissions: []
    state: present

  - attrs:
      expression: |-
        return {
            "username": ldap.get("sAMAccountName"),
        }
