      managed: goauthentik.io/sources/ldap/openldap-uid
      name: 'authentik default OpenLDAP Mapping: uid'
    conditions: []
    identifiers:
      pk: 2ce5edea-5590-4542-8625-bd26941a1490
    model: authentik_sources_ldap.ldapsourcepropertymapping
    permissions: []
    state: present

  - attrs:
      expression: |-
        return {
            "name": ldap.get("cn"),
        }
      managed: goauthentik.io/sources/ldap/openldap-cn
      name: 'authentik default OpenLDAP Mapping: cn'
    conditions: []
    identifiers:
      pk: 2e1bfc05-50ad-496f-a68e-c07305b6c27b
    model: authentik_sources_ldap.ldapsourcepropertymapping
    permissions: []
