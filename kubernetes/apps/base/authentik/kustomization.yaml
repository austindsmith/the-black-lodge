apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik

resources:
  - ./ingressroute.yaml
  - ./namespace.yaml
  #- ./service.yaml

generators:
  - ./secret-generator.yaml

helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io/
    version: 2026.5.0
    releaseName: authentik
    namespace: authentik
    valuesFile: values.yaml
    kubeVersion: v1.36.1


