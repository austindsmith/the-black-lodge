apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik

resources:
  - ./namespace.yaml
  - ./helmrelease.yaml
  - ./helmrepository.yaml
  - ./ingressroute.yaml
  - ./secret.yaml
  - ./blueprints/secret.yaml

configMapGenerator:
  - name: authentik-custom-blueprints
    files:
      - blueprints/theblacklodge.yaml
      - blueprints/users.yaml
      - blueprints/providers.yaml
      - blueprints/applications.yaml
    options:
      disableNameSuffixHash: true
