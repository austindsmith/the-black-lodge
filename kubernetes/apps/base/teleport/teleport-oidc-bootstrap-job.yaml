apiVersion: batch/v1
kind: Job
metadata:
  name: teleport-oidc-bootstrap
  namespace: teleport
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: teleport-bootstrap
      initContainers:
        - name: wait-for-teleport
          image: alpine/k8s:1.32.3
          command:
            - sh
            - -c
            - |
              until kubectl get pod -n teleport -l app.kubernetes.io/name=teleport \
                -o jsonpath='{.items[0].status.phase}' 2>/dev/null | grep -q Running; do
                sleep 5
              done
      containers:
        - name: tctl
          image: alpine/k8s:1.32.3
          command:
            - sh
            - -c
            - |
              POD=$(kubectl get pod -n teleport -l app.kubernetes.io/name=teleport -o jsonpath='{.items[0].metadata.name}')
              kubectl cp /config/oidc.yaml teleport/${POD}:/tmp/oidc.yaml
              kubectl exec -n teleport ${POD} -- tctl create -f /tmp/oidc.yaml
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          secret:
            secretName: teleport-oidc
