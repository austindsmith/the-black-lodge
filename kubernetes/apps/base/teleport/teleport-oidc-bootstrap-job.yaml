apiVersion: batch/v1
kind: Job
metadata:
  name: teleport-oidc-bootstrap
  namespace: teleport
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: teleport-bootstrap
      initContainers:
        - name: wait-for-auth
          image: alpine/k8s:1.32.3
          command:
            - sh
            - -c
            - |
              until kubectl get pod -n teleport \
                -l app.kubernetes.io/instance=teleport,app.kubernetes.io/component=auth \
                -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null | grep -q True; do
                sleep 5
              done
      containers:
        - name: tctl
          image: alpine/k8s:1.32.3
          command:
            - sh
            - -c
            - |
              POD=$(kubectl get pod -n teleport -l app.kubernetes.io/instance=teleport,app.kubernetes.io/component=auth -o jsonpath='{.items[0].metadata.name}')
              kubectl exec -i -n teleport "${POD}" -- tctl create -f /dev/stdin < /config/oidc.yaml
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          secret:
            secretName: teleport-oidc
