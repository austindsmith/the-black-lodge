apiVersion: batch/v1
kind: Job
metadata:
  name: teleport-oidc-bootstrap
  namespace: teleport
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-teleport
          image: busybox
          command:
            - sh
            - -c
            - until nc -z teleport 443; do sleep 5; done
      containers:
        - name: tctl
          image: public.ecr.aws/gravitational/teleport:18.8.3
          command:
            - sh
            - -c
            - |
              tctl create -f /config/oidc.yaml
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          secret:
            secretName: teleport-oidc
