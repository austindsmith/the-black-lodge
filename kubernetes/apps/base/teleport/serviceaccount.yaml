apiVersion: v1
kind: ServiceAccount
metadata:
  name: teleport-bootstrap
  namespace: teleport
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: teleport-bootstrap
  namespace: teleport
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teleport-bootstrap
  namespace: teleport
subjects:
  - kind: ServiceAccount
    name: teleport-bootstrap
    namespace: teleport
roleRef:
  kind: Role
  name: teleport-bootstrap
  apiGroup: rbac.authorization.k8s.io
