apiVersion: v1
kind: ServiceAccount
metadata:
  name: teleport-bootstrap
  namespace: teleport
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: teleport-bootstrap
  namespace: teleport
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teleport-bootstrap
  namespace: teleport
subjects:
  - kind: ServiceAccount
    name: teleport-bootstrap
    namespace: teleport
roleRef:
  kind: Role
  name: teleport-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: teleport-oidc-bootstrap
  namespace: teleport
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: teleport-bootstrap
      initContainers:
        - name: wait-for-teleport
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              until kubectl get pod -n teleport -l app=teleport -o jsonpath='{.items[0].status.phase}' | grep -q Running; do
                sleep 5
              done
      containers:
        - name: tctl
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              POD=$(kubectl get pod -n teleport -l app=teleport -o jsonpath='{.items[0].metadata.name}')
              kubectl cp /config/oidc.yaml teleport/${POD}:/tmp/oidc.yaml
              kubectl exec -n teleport ${POD} -- tctl create -f /tmp/oidc.yaml
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          secret:
            secretName: teleport-oidc
