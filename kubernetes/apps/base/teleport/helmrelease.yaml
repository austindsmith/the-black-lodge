apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport
  namespace: teleport
spec:
  interval: 1h
  install:
    createNamespace: true
  chart:
    spec:
      chart: teleport-cluster
      version: 18.8.3
      sourceRef:
        kind: HelmRepository
        name: teleport
        namespace: teleport
  values:
    clusterName: teleport.theblacklodge.dev
    proxyListenerMode: multiplex
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 10Gi
    service:
      type: ClusterIP
  proxy_service:
    enabled: true
    # TLS certificate for the HTTPS connection.
    https_keypairs: []
    # Get an automatic certificate from letsencrypt.org using ACME.
    acme: {}
