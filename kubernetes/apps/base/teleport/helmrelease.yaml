apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: teleport-cluster
      version: 18.8.3
      sourceRef:
        kind: HelmRepository
        name: teleport
  values:
    operator:
      enabled: true
    chartMode: standalone
    clusterName: teleport.theblacklodge.dev
    proxyListenerMode: "multiplex"
    authentication:
      type: 'github'
    extraArgs:
      - "--insecure"
    auth:
      teleportConfig:
        teleport:
          log:
            output: stderr
            severity: DEBUG
        auth_service:
          enabled: true
          listen_addr: 0.0.0.0:3025
          public_addr: teleport.theblacklodge.dev:3025
          web_idle_timeout: 1h
          authentication:
            locking_mode: best_effort

    proxy:
      teleportConfig:
        teleport:
          log:
            output: stderr
            severity: DEBUG

        proxy_service:
          enabled: true
          web_listen_addr: 0.0.0.0:3080
          public_addr: teleport.theblacklodge.dev:443
          https_keypairs_reload_interval: 12h

    podSecurityPolicy:
      enabled: false
