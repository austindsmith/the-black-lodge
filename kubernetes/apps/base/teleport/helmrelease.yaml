apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: teleport-cluster
      version: 18.8.3
      sourceRef:
        kind: HelmRepository
        name: teleport
  values:
    chartMode: standalone
    clusterName: teleport.theblacklodge.dev
    proxyListenerMode: "multiplex"
    extraArgs:
      - "--insecure"
    auth:
      teleportConfig:
        # put any teleport.yaml auth configuration overrides here
        teleport:
          log:
            output: stderr
            severity: DEBUG

        auth_service:
          enabled: true
          listen_addr: 0.0.0.0:3025
          public_addr: teleport.theblacklodge.dev:3025
          web_idle_timeout: 1h
          authentication:
            locking_mode: best_effort

    proxy:
      teleportConfig:
        # put any teleport.yaml proxy configuration overrides here
        teleport:
          log:
            output: stderr
            severity: DEBUG

        proxy_service:
          enabled: true
          web_listen_addr: 0.0.0.0:3080
          public_addr: teleport.theblacklodge.dev:443
          https_keypairs_reload_interval: 12h
          # optionally override the public addresses for the cluster
          # public_addr: custom.example.com:443
          # tunnel_public_addr: custom.example.com:3024

    # If you are running Kubernetes 1.23 or above, disable PodSecurityPolicies
    podSecurityPolicy:
      enabled: false

    # OPTIONAL - when using highly-available storage for both backend AND session recordings
    # you can disable disk persistence and replicate auth pods.
    #
    # persistence:
    #   enabled: false
    # highAvailability:
    #   replicaCount: 2
