apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport
  namespace: teleport
spec:
  interval: 1h

  install:
    createNamespace: true

  chart:
    spec:
      chart: teleport-cluster
      version: 18.8.3
      sourceRef:
        kind: HelmRepository
        name: teleport
        namespace: flux-system

  values:
    clusterName: teleport.theblacklodge.dev

    proxyListenerMode: multiplex

    auth:
      enabled: true

    proxy:
      enabled: true
      publicAddr: teleport.theblacklodge.dev:443

    ssh_service:
      enabled: false

    persistence:
      enabled: true
      storageClassName: longhorn
      size: 10Gi

    service:
      type: ClusterIP
