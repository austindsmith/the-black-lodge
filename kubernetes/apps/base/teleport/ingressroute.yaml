apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: teleport
  namespace: teleport
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`teleport.theblacklodge.dev`)
      kind: Rule
      services:
        - name: teleport
          port: 3080
  tls:
    certResolver: cloudflare
