apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: teleport
  namespace: teleport
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`teleport.theblacklodge.dev`)
      kind: Rule
      services:
        - name: teleport
          port: 443

  tls:
    certResolver: cloudflare
