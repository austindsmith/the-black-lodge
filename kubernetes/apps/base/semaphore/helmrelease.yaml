apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: semaphore
      version: 16.2.2
      sourceRef:
        kind: HelmRepository
        name: semaphore
  valuesFrom:
    - kind: Secret
      name: semaphore
      valuesKey: client_id
      targetPath: oidc.providers.authentik.client_id
    - kind: Secret
      name: semaphore
      valuesKey: client_secret
      targetPath: oidc.providers.authentik.client_secret
    - kind: Secret
      name: semaphore
      valuesKey: admin_full_name
      targetPath: admin.fullname
    - kind: Secret
      name: semaphore
      valuesKey: admin_username
      targetPath: admin.username
    - kind: Secret
      name: semaphore
      valuesKey: admin_password
      targetPath: admin.password
    - kind: Secret
      name: semaphore_postgres
      valuesKey: admin_password
      targetPath: database.auth.password

  values:
    database:
      type: postgres
      name: semaphore
      host: app-cluster-rw.cloudnative-pg.svc.cluster.local
      port: 5432
      usernameFromSecret: true
      usernameKey: username
      passwordKey: password
      existingSecret: semaphore-postgres

    postgresql:
      enabled: false
    admin:
      create: true
    oidc:
      enable: true
      providers:
        authentik:
          display_name: Authentik
          provider_url: https://authentik.theblacklodge.dev/application/o/semaphore/
          redirect_url: https://semaphore.theblacklodge.dev/api/auth/oidc/authentik/redirect
          username_claim: preferred_username
          name_claim: preferred_username
          email_claim: email
          scopes:
            - openid
            - profile
            - email
