apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
  values:
    config:
      watchPlugins: true
      oidc:
        issuerURL: "https://authentik.theblacklodge.dev/application/o/headlamp/"
        scopes: "openid email profile groups"
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.4.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
        installOptions:
          parallel: true
          maxConcurrent: 2
  valuesFrom:
    - kind: Secret
      name: headlamp
      valuesKey: client_id
      targetPath: config.oidc.clientID
    - kind: Secret
      name: headlamp
      valuesKey: client_secret
      targetPath: config.oidc.clientSecret
