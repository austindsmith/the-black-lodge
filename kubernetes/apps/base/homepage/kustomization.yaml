apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage

resources:
  - namespace.yaml
  - ocirepository.yaml
  - helmrelease.yaml
  - ingressroute.yaml
  - secret.yaml

configMapGenerator:
  - name: homepage-config
    files:
      - config/bookmarks.yaml
      - config/proxmox.yaml
      - config/services.yaml
      - config/settings.yaml
      - config/widgets.yaml
    options:
      disableNameSuffixHash: true
