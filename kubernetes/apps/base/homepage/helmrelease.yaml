apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: homepage
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: homepage
  values:
    enableRbac: false
    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: homepage.theblacklodge.dev
