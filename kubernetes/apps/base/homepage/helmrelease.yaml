apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 1h
  chart:
    spec:
      chart: homepage
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: homepage
  values:
    config:
      useExistingConfigMap: homepage
    enableRbac: true
    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: homepage.theblacklodge.dev

    volumes:
      - name: homepage-config
        secret:
          secretName: homepage-config

    volumeMounts:
      - name: homepage-config
        mountPath: /app/config/proxmox.yaml
        subPath: proxmox.yaml
      - name: homepage-config
        mountPath: /app/config/services.yaml
        subPath: services.yaml
