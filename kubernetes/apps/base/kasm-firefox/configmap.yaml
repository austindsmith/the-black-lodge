apiVersion: v1
kind: ConfigMap
metadata:
  name: firefox-custom-init
binaryData:
  favicon.ico: 
data:
  10-branding.sh: |
    #!/usr/bin/with-contenv bash
    WWW_DIR=/usr/share/kasmvnc/www
    if [ -d "$WWW_DIR" ]; then
      sed -i 's|<title>.*</title>|<title>Special Education Data/title>|' "$WWW_DIR/index.html"
      cp /custom-cont-init.d/favicon.ico "$WWW_DIR/favicon.ico"
    fi
