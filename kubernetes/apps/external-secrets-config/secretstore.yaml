apiVersion: external-secrets.io/v1alpha1
kind: SecretStore
metadata:
  name: infisical
  namespace: external-secrets
spec:
  provider:
    infisical:
      hostAPI: https://infisical.theblacklodge.org
      auth:
        universalAuthCredentials:
          clientId:
            name: universal-auth-credentials
            key: clientId
          clientSecret:
            name: universal-auth-credentials
            key: clientSecret
      secretsScope:
        projectSlug: home-lab-bbg-f
        environmentSlug: prod