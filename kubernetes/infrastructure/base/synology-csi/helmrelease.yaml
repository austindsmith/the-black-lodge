apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synology-csi
  namespace: synology-csi
spec:
  interval: 30m
  chart:
    spec:
      chart: synology-csi-chart
      version: "0.11.2"
      sourceRef:
        kind: HelmRepository
        name: synology-csi
        namespace: flux-system
  values:
    clientInfoSecret:
      create: false
      name: synology-csi-client-info
    storageClasses:
      synology-iscsi:
        disabled: false
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        parameters:
          dsm: "192.168.1.131"
          location: /volume1/data
          fsType: ext4
