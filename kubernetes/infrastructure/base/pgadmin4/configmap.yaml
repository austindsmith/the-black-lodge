apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin4
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "cloudnative-pg",
          "Group": "Servers",
          "Host": "cloudnative-pg-rw.cloudnative-pg.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgres",
          "PassFile": "/var/lib/pgadmin/storage/pgadmin/file.pgpass",
          "SSLMode": "prefer"
        }
      }
    }
