apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin4
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "app-cluster",
          "Group": "Servers",
          "Host": "app-cluster-rw",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgres",
          "PassFile": "/file.pgpass",
          "SSLMode": "prefer"
        },
        "2": {
          "Name": "data-cluster",
          "Group": "Servers",
          "Host": "data-cluster-rw",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgres",
          "PassFile": "/file.pgpass",
          "SSLMode": "prefer"
        }
      }
    }
