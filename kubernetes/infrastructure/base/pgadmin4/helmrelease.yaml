apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: pgadmin4
      version: 1.64.0
      sourceRef:
        kind: HelmRepository
        name: pgadmin4
  valuesFrom:
    - kind: Secret
      name: pgadmin-pgpass
      valuesKey: pgadmin_password
      targetPath: env.password
  values:
    serverDefinitions:
      enabled: true
      resourceType: ConfigMap
      existingConfigmap: "pgadmin4"
    env:
      email: austindsmith_accounts@proton.me
    envVarsFromSecrets: [pgadmin-oauth, pgadmin-env]
    extraSecretMounts:
      - name: pgpass-file
        secret: pgadmin-pgpass
        mountPath: /pgpass
        readOnly: true
