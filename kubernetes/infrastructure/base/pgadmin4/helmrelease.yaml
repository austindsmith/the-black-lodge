apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: pgadmin4
      version: 1.62.0
      sourceRef:
        kind: HelmRepository
        name: pgadmin4
  values:
    serverDefinitions:
      enabled: true
      resourceType: ConfigMap
      existingConfigmap: "pgadmin4"
    env:
      pgpassfile: /var/lib/pgadmin/storage/pgadmin/file.pgpass
      contextPath: /pgadmin4
    envVarsFromSecrets: [pgadmin-oauth, pgadmin-env]
    extraConfigmapMounts:
      - name: servers-config
        configMap: pgadmin4
        mountPath: /pgadmin4/servers.json
        subPath: servers.json
        readOnly: true
    #extraSecretMounts:
    #  - name: pgpass
    #    secret: pgadmin-pgpass
    #    mountPath: "/var/lib/pgadmin/storage/pgadmin/file.pgpass"
    #    subPath: pgpassfile
    #    defaultMode: "0600"
    #    readOnly: true
