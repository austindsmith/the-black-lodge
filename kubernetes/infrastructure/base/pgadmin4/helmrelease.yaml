apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: pgadmin4
      version: 1.64.0
      sourceRef:
        kind: HelmRepository
        name: pgadmin4
  valuesFrom:
    - kind: Secret
      name: pgadmin-pgpass
      valuesKey: postgres_password
      targetPath: env.password
  values:
    serverDefinitions:
      enabled: true
      resourceType: ConfigMap
      existingConfigmap: "pgadmin4"
    env:
      email: austindsmith_accounts@proton.me
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    envVarsFromSecrets: [pgadmin-oauth, pgadmin-env]
    extraSecretMounts:
      - name: pgpass-app
        secret: app-cluster-superuser
        mountPath: /pgpass-src/app
        readOnly: true
      - name: pgpass-data
        secret: data-cluster-superuser
        mountPath: /pgpass-src/data
        readOnly: true
    extraInitContainers: |
      - name: stage-pgpass
        image: dpage/pgadmin4:latest
        command:
          - /bin/sh
          - -c
          - >
            mkdir -p /var/lib/pgadmin/storage/austindsmith_accounts_proton.me &&
            ( cat /pgpass-src/app/pgpass; echo; cat /pgpass-src/data/pgpass; echo ) > /var/lib/pgadmin/storage/austindsmith_accounts_proton.me/file.pgpass &&
            chmod 600 /var/lib/pgadmin/storage/austindsmith_accounts_proton.me/file.pgpass
        securityContext:
          runAsUser: 5050
        volumeMounts:
          - name: pgadmin-data
            mountPath: /var/lib/pgadmin
          - name: pgpass-app
            mountPath: /pgpass-src/app
          - name: pgpass-data
            mountPath: /pgpass-src/data
