apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: pgadmin4
      version: 1.62.0
      sourceRef:
        kind: HelmRepository
        name: pgadmin4
  valuesFrom:
    - kind: Secret
      name: cloudnative-pg-superuser
      valuesKey: password
      targetPath: env.password
  values:
    serverDefinitions:
      enabled: true
      resourceType: ConfigMap
      existingConfigmap: "pgadmin4"
    env:
      email: austindsmith@proton.me
      pgpassfile: /pgadmin4/pgpass/file.pgpass
    envVarsFromSecrets: [pgadmin-oauth, pgadmin-env]
    extraSecretMounts:
      - name: pgpass
        secret: cloudnative-pg-superuser
        mountPath: "/pgadmin4/pgpass/file.pgpass"
        subPath: pgpass
        defaultMode: 0600
        readOnly: true
