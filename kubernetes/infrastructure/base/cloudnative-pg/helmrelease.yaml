apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.3
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: cloudnative-pg
  values:
    crds:
      create: true
    webhook:
      mutating:
        failurePolicy: Ignore
      validating:
        failurePolicy: Ignore
      mutatingWebhookConfigurationAnnotations:
        cert-manager.io/inject-ca-from: cnpg-system/cnpg-webhook-service-cert
      validatingWebhookConfigurationAnnotations:
        cert-manager.io/inject-ca-from: cnpg-system/cnpg-webhook-service-cert
    cert-manager:
      enabled: true
