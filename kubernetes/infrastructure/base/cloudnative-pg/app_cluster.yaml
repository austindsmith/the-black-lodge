apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: app-cluster
spec:
  instances: 3
  enableSuperuserAccess: true
  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
  bootstrap:
    initdb:
      owner: postgres
      secret:
        name: cloudnative-pg
  storage:
    size: 5Gi
  monitoring:
    enablePodMonitor: true
    customQueriesConfigMap:
      - name: cnpg-default-monitoring
        key: queries
  managed:
    roles:
      - name: authentik
        passwordSecret:
          name: authentik_db_secret
        login: true
      - name: immich
        passwordSecret:
          name: immich_db_secret
        login: true
      - name: n8n
        passwordSecret:
          name: n8n_db_secret
        login: true
      - name: nextcloud
        passwordSecret:
          name: nextcloud_db_secret
        login: true
      - name: mealie
        passwordSecret:
          name: mealie_db_secret
        login: true
      - name: paperless-ngx
        passwordSecret:
          name: paperless_ngx_db_secret
        login: true
      - name: semaphore
        passwordSecret:
          name: semaphore_db_secret
        login: true
