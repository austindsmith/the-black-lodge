apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: data-cluster
spec:
  instances: 3
  enableSuperuserAccess: true
  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
  bootstrap:
    initdb:
      owner: postgres
      secret:
        name: cloudnative-pg-admin
  storage:
    size: 5Gi
