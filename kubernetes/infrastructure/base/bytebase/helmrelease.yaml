apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bytebase
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: bytebase
      version: 1.1.3
      sourceRef:
        kind: HelmRepository
        name: bytebase
  valuesFrom:
    - kind: Secret
      name: bytebase
      valuesKey: postgres_password
      targetPath: bytebase.options.externalPg.pgPassword
  values:
    bytebase:
      options:
        external-url: "https://bytebase.theblacklodge.dev"
        externalPg: # Bytebase will ignore the bytebase.option.externalPg.url if this is specified.
          pgHost: "app-cluster-rw.cloudnative-pg.svc.cluster.local"
          pgPort: "5432"
          pgUsername: "postgres"
          pgDatabase: "postgres"
