apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  interval: 1h
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik
      version: 39.0.8
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    ports:
      web:
        forwardedHeaders:
          trustedIPs:
            - 10.42.0.0/16
            - 10.43.0.0/16
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
