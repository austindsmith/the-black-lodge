apiVersion: v1
kind: Service
metadata:
  name: rustfs-console
spec:
  type: ExternalName
  externalName: 192.168.1.131
  ports:
    - port: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs-endpoint
spec:
  type: ExternalName
  externalName: 192.168.1.131
  ports:
    - port: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs-endpoint
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`rustfs-endpoint.theblacklodge.dev`)
      kind: Rule
      services:
        - name: rustfs-endpoint
          port: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs-console
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`rustfs.theblacklodge.dev`)
      kind: Rule
      services:
        - name: rustfs-console
          port: 9001
