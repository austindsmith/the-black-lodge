apiVersion: v1
kind: Service
metadata:
  name: rustfs-console
spec:
  ports:
    - port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: rustfs-console
subsets:
  - addresses:
      - ip: 192.168.1.131
    ports:
      - port: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs-endpoint
spec:
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: rustfs-endpoint
subsets:
  - addresses:
      - ip: 192.168.1.131
    ports:
      - port: 9000
