apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-tunnel
  namespace: traefik
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: "*.theblacklodge.dev"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik
                port:
                  number: 80