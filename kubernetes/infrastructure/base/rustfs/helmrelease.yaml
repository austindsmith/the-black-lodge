apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
spec:
  interval: 1h
  chart:
    spec:
      chart: rustfs
      version: "0.8.0"
      sourceRef:
        kind: HelmRepository
        name: rustfs
  values:
    existingSecret:
    storageclass:
      name: synology-csi-iscsi-retain
      dataStorageSize: 500Gi
      logStorageSize: 10Gi
