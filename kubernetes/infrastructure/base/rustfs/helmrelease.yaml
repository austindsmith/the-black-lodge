apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
spec:
  interval: 1h
  chart:
    spec:
      chart: teleport-kube-agent
      version: "0.8.0"
      sourceRef:
        kind: HelmRepository
        name: teleport
  values:
    persistence:
      data:
        enabled: true
        storageClass: synology-iscsi
        accessMode: ReadWriteOnce
        size: 500Gi
