apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
spec:
  interval: 1h
  chart:
    spec:
      chart: rustfs
      version: "0.8.0"
      sourceRef:
        kind: HelmRepository
        name: rustfs
  valuesFrom:
    - kind: Secret
      name: rustfs-credentials
      valuesKey: access_key
      targetPath: secret.rustfs.access_key
    - kind: Secret
      name: rustfs-credentials
      valuesKey: secret_key
      targetPath: secret.rustfs.secret_key
  values:
    mode:
      standalone:
        enabled: true
      distributed:
        enabled: false
    storageclass:
      name: synology-iscsi
      dataStorageSize: 50Gi
      logStorageSize: 1Gi
