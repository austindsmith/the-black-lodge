apiVersion: resources.teleport.dev/v5
kind: TeleportRole
metadata:
  name: db-access
spec:
  allow:
    impersonate:
      users: ["Db"]
      roles: ["Db"]
    db_labels:
      "*": "*"
    db_names:
      - authentik
      - immich
      - n8n
      - nextcloud
      - mealie
      - paperless_ngx
      - semaphore
      - postgres
    db_users:
      - postgres
      - authentik
      - semaphore
      - nextcloud
      - n8n
      - mealie
      - paperless-ngx
      - immich
