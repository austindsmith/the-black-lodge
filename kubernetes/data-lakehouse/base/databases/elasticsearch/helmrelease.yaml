apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: elasticsearch
      version: 8.5.1
      sourceRef:
        kind: HelmRepository
        name: elasticsearch
  valuesFrom:
    - kind: Secret
      name: elasticsearch
      valuesKey: password
      targetPath: secret.password
  values:
    replicas: 1
    minimumMasterNodes: 1
    secret:
      enabled: false
    networkPolicy:
      http:
        enabled: false
    volumeClaimTemplate:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn-single-replica
      resources:
        requests:
          storage: 10Gi
