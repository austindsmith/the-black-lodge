apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dbgate
spec:
  install:
    createNamespace: true
  interval: 1h
  chart:
    spec:
      chart: dbgate
      version: v2026.3.30
      sourceRef:
        kind: HelmRepository
        name: dbgate
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              $patch: delete
              apiVersion: gateway.networking.k8s.io/v1
              kind: Gateway
              metadata:
                name: dbgate
          - patch: |
              $patch: delete
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: dbgate
  values:
    fullnameOverride: "dbgate"
    image:
      pullPolicy: IfNotPresent
    app:
      kind: "Postgres"
      service:
        name: "app-cluster-rw"
        namespace: "cloudnative-pg"
      authSecret:
        name: "dbgate-cloudnative-pg-secret"
      tls:
        enabled: false
    gateway:
      referenceGrant:
        create: false
