apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jupyterhub

resources:
  - ./ingressroute.yaml
  - ./namespace.yaml

helmCharts:
  - name: jupyterhub
    repo: https://jupyterhub.github.io/helm-chart/
    version: 5.0.0-0.dev.git.7399.h8efc9def
    releaseName: jupyterhub
    namespace: jupyterhub
    valuesFile: values.yaml
    kubeVersion: v1.36.1


