apiVersion: batch/v1
kind: Job
metadata:
  name: nfs-test
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - sh
            - -c
            - |
              echo "hello from kubernetes $(date)" > /mnt/test.txt
              cat /mnt/test.txt
          volumeMounts:
            - name: nfs
              mountPath: /mnt
      volumes:
        - name: nfs
          nfs:
            server: "{{ .Values.nfs.server }}"
            path: "{{ .Values.nfs.path }}"
