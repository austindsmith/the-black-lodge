apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-crds
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/base/cloudnative-pg/crds
  prune: false
  wait: true
