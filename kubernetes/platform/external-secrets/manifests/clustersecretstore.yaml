apiVersion: external-secrets.io/v2
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: https://infisical.thewhitelodge.org
      auth:
        universalAuthCredentials:
          clientId:
            name: universal-auth-credentials
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: universal-auth-credentials
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: home-lab-bbg-f
        environmentSlug: dev