helmDefaults:
  createNamespace: true
  
repositories:
- name: longhorn
  url: https://charts.longhorn.io
releases:
- name: longhorn
  namespace: longhorn-system
  version: 1.11.1
  chart: longhorn/longhorn
  hooks:
    - events: ["postsync"]
      command: kubectl
      args: ["apply", "-f", "manifests/"]
