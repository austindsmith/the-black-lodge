helmDefaults:
  createNamespace: true

repositories:
- name: cloudflare-tunnel-ingress-controller
  url: https://helm.strrl.dev
releases:
- name: cloudflare-tunnel-ingress-controller
  namespace: cloudflare-tunnel-ingress-controller
  version: v0.0.23
  chart: cloudflare-tunnel-ingress-controller/cloudflare-tunnel-ingress-controller
  hooks:
    - events: ["postsync"]
      command: kubectl
      args: ["wait", "--for=condition=established", "--timeout=60s", "crd/externalsecrets.external-secrets.io"]
    - events: ["postsync"]
      command: kubectl
      args: ["wait", "--for=condition=established", "--timeout=60s", "deployments/external-secrets-webhook", "-n", "external-secrets"]
    - events: ["postsync"]
      command: kubectl
      args: ["apply", "-f", "manifests/"]