- name: Make k3s kubeconfig world-readable
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'

- name: Create argocd namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: argocd
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Install ArgoCD
  kubernetes.core.k8s:
    namespace: argocd
    state: present
    src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for ArgoCD server to be ready
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    kind: Deployment
    name: argocd-server
    namespace: argocd
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120

- name: Hash ArgoCD admin password
  ansible.builtin.command:
    cmd: python3 -c "import bcrypt; print(bcrypt.hashpw(b'{{ argocd_admin_password }}', bcrypt.gensalt(10)).decode())"
  register: argocd_password_hash
  changed_when: false
  no_log: true

- name: Set ArgoCD admin password
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-secret
        namespace: argocd
      stringData:
        admin.password: "{{ argocd_password_hash.stdout }}"
        admin.passwordMtime: "{{ ansible_date_time.iso8601 }}"

- name: Expose ArgoCD via NodePort (or Ingress later)
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: argocd-server-nodeport
        namespace: argocd
      spec:
        type: NodePort
        selector:
          app.kubernetes.io/name: argocd-server
        ports:
          - port: 80
            targetPort: 8080
            nodePort: 30080

- name: Register GitHub repo with ArgoCD
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: the-black-lodge-repo
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: repository
      stringData:
        type: git
        url: https://github.com/austindsmith/the-black-lodge

- name: Copy root app manifest to server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../kubernetes/root-app.yaml"
    dest: /tmp/root-app.yaml

- name: Apply root ArgoCD app
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    src: /tmp/root-app.yaml

- name: create sops age key secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: sops-age-key
        namespace: argocd
      stringData:
        keys.txt: "{{ lookup('file', '~/.config/sops/age/keys.txt') }}"
