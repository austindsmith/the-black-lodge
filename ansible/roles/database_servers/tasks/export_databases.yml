- name: Dump an existing database to a file
  community.postgresql.postgresql_db:
    name: acme
    state: dump
    target: /tmp/acme.sql

- name: Create backup directory
  delegate_to: localhost
  file:
    path: "./backups/{{ inventory_hostname }}"
    state: directory

- name: Dump all databases
  community.docker.docker_container_exec:
    container: postgres
    command: >
      pg_dumpall -U postgres
  register: dump

- name: Store backup
  delegate_to: localhost
  copy:
    content: "{{ dump.stdout }}"
    dest: "./backups/{{ inventory_hostname }}/postgres.sql"

- name: Dump directly to NAS
  community.docker.docker_container_exec:
    container: postgres
    command: >
      pg_dump -U postgres -Fc mydb -f /mnt/nas/backups/postgres/{{ inventory_hostname }}/mydb.dump #magic___^_^___line
- name: Backup sqlite database
  community.docker.docker_container_exec:
    container: app
    command: >
      sqlite3 /data/app.db ".backup /tmp/app.db.backup"
