apiVersion: k3d.io/v1alpha5 # https://k3d.io/v5.1.0/usage/configfile/
kind: Simple
metadata:
  name: local-machine-cluster
servers: 1
kubeAPI:
  hostIP: 127.0.0.1
  hostPort: "6443"
ports:
- port: 80:80
  nodeFilters:
  - loadbalancer
- port: 443:443
  nodeFilters:
  - loadbalancer
options:
  k3d:
    wait: true
    timeout: 6m0s
    disableLoadbalancer: false
    disableImageVolume: false
    disableRollback: false
  k3s:
    extraArgs:
    - arg: --tls-san=127.0.0.1
      nodeFilters:
      - servers:*
    - arg: --disable=traefik
      nodeFilters:
      - servers:*