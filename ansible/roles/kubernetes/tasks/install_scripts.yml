- name: Remove stale {{ install_script.name }} binary if present
  ansible.builtin.file:
    path: "/home/ansible/{{ install_script.name }}"
    state: absent

- name: Remove stale {{ install_script.name }} tmp file if present
  ansible.builtin.file:
    path: "/tmp/{{ install_script.name }}.sh"
    state: absent

- name: Download {{ install_script.name }} install script
  ansible.builtin.get_url:
    url: "{{ install_script.script_url }}"
    dest: /tmp/{{ install_script.name }}.sh
    mode: "0755"

- name: Install {{ install_script.name }}
  ansible.builtin.command: /tmp/{{ install_script.name }}.sh
  become: "{{ install_script.become | default(false) }}"
