- name: Refresh service facts
  ansible.builtin.service_facts:

- name: Disable and stop ufw
  ansible.builtin.systemd:
    name: ufw
    state: stopped
    enabled: false
  when: ansible_facts.services['ufw.service'] is defined

- name: Disable and stop firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  when: ansible_facts.services['firewalld.service'] is defined

- name: Grow root partition to fill disk
  ansible.builtin.command: growpart /dev/vda 2
  register: growpart_result
  changed_when: "'CHANGED' in growpart_result.stdout"
  failed_when: growpart_result.rc != 0 and 'NOCHANGE' not in growpart_result.stdout

- name: Resize LVM physical volume
  ansible.builtin.command: pvresize /dev/vda2
  changed_when: false

- name: Extend root logical volume
  ansible.builtin.command: lvextend -l +100%FREE /dev/vg0/lv_root
  register: lvextend_result
  changed_when: "'successfully resized' in lvextend_result.stdout"
  failed_when: lvextend_result.rc != 0 and 'matches existing size' not in lvextend_result.stderr

- name: Resize root filesystem
  ansible.builtin.command: resize2fs /dev/vg0/lv_root
  changed_when: false
