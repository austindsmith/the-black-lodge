- name: Create argocd namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: argocd
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Download argocd manifest
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
    dest: /tmp/argocd-install.yaml

- name: Install argocd
  kubernetes.core.k8s:
    namespace: argocd
    state: present
    src: /tmp/argocd-install.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for argocd to be ready
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    kind: Deployment
    name: argocd-server
    namespace: argocd
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 180

- name: Hash argocd admin password
  ansible.builtin.command:
    cmd: python3 -c "import bcrypt; print(bcrypt.hashpw(b'{{ argocd_admin_password }}', bcrypt.gensalt(10)).decode())"
  register: argocd_password_hash
  changed_when: false
  no_log: true

- name: Set argocd admin password
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-secret
        namespace: argocd
      stringData:
        admin.password: "{{ argocd_password_hash.stdout }}"
        admin.passwordMtime: "{{ ansible_date_time.iso8601 }}"

- name: Expose argocd via nodeport
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: argocd-server-nodeport
        namespace: argocd
      spec:
        type: NodePort
        selector:
          app.kubernetes.io/name: argocd-server
        ports:
          - port: 80
            targetPort: 8080
            nodePort: 30080

- name: Register github repo with argocd
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: the-black-lodge-repo
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: repository
      stringData:
        type: git
        url: https://github.com/austindsmith/the-black-lodge

- name: Copy root app manifest to server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../kubernetes/root-app.yaml"
    dest: /tmp/root-app.yaml
    mode: "0644"
        
- name: Apply root argocd app
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    src: /tmp/root-app.yaml