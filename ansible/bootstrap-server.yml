- name: Configure firewall and Cockpit
  hosts: tang
  become: true
  handlers:
    - name: Restart ssh
      ansible.builtin.systemd:
        name: sshd
        state: restarted
  tasks:
    - name: Install firewalld
      ansible.builtin.package:
        name: firewalld
        state: present

    - name: Install zsh
      ansible.builtin.package:
        name: zsh
        state: present

    - name: Disable and stop ufw
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      when: ansible_facts.services['ufw.service'] is defined

    - name: Enable and start firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Allow ssh
      ansible.posix.firewalld:
        service: ssh
        zone: public
        permanent: true
        state: enabled
        immediate: true



    - name: Allow cockpit in firewalld
      ansible.posix.firewalld:
        service: cockpit
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Install cockpit - server management UI
      ansible.builtin.include_role:
        name: linux-system-roles.cockpit
      vars:
        cockpit_packages: default
        cockpit_port: 9090
        cockpit_enabled: true
        cockpit_started: true
        cockpit_transactional_update_reboot_ok: true

    - name: Join FreeIPA domain
      ansible.builtin.include_role:
        name: freeipa.ansible_freeipa.ipaclient
      vars:
        ipaclient_domain: theblacklodge.org
        ipaclient_realm: THEBLACKLODGE.ORG
        ipaadmin_principal: "{{ vault_ipa_admin_user }}"
        ipaadmin_password: "{{ vault_ipa_admin_password }}"
        ipaclient_configure_dns_resolver: true
        ipaclient_mkhomedir: true
        ipaclient_dns_servers: 192.168.1.5
        ipaclient_force_join: true
        ipaclient_servers: ipa.theblacklodge.org
        ipaclient_hostname: "{{ inventory_hostname }}.theblacklodge.org"
        ipaclient_enable_dns_updates: true
      when: inventory_hostname != 'ipa'


    - name: Configure sshd for sssd key lookup
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/04-ipa.conf
        regexp: '^AuthorizedKeysCommand '
        line: 'AuthorizedKeysCommand /usr/bin/sss_ssh_authorizedkeys %u'
        validate: ssh -t -f %s
      notify: Restart ssh
